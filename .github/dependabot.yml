# Dependabot config — added under Steven founder override S459 (2026-05-30).
# Pending Sirius ratification follow-up.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[G33:A] chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "[G33:A] chore(actions)"
    labels:
      - "github-actions"
      - "automated"

