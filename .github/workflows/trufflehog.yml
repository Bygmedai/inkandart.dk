# TruffleHog — secret detection (gratis open source, fri for orgs).
# Added under Steven founder override S459 (2026-05-30).
# Pending Sirius ratification follow-up.
name: TruffleHog
on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

